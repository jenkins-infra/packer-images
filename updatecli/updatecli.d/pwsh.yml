---
name: Bump pwsh version

scms:
  default:
    kind: github
    spec:
      user: "{{ .github.user }}"
      email: "{{ .github.email }}"
      owner: "{{ .github.owner }}"
      repository: "{{ .github.repository }}"
      token: "{{ requiredEnv .github.token }}"
      username: "{{ .github.username }}"
      branch: "{{ .github.branch }}"

sources:
  lastReleaseVersion:
    kind: githubrelease
    name: Get the latest pwsh version
    spec:
      owner: "PowerShell"
      repository: "PowerShell"
      token: "{{ requiredEnv .github.token }}"
      username: "{{ .github.username }}"
      versionfilter:
        kind: semver
    transformers:
      - trimprefix: v

conditions:
  checkForZipDistribution:
    kind: file
    name: Check for pwsh ZIP installer attached to the GH release
    disablesourceinput: true
    spec:
      file: https://github.com/PowerShell/PowerShell/releases/download/v{{ source "lastReleaseVersion" }}/PowerShell-{{ source "lastReleaseVersion" }}-win-x64.zip'

targets:
  updateVersion:
    name: "Update the `Pwsh` version in the provisioning/tools-versions.yml file"
    sourceid: lastReleaseVersion
    kind: yaml
    spec:
      file: "provisioning/tools-versions.yml"
      key: $.windows_pwsh_version
    scmid: default
  updatePwshVersionInGoss:
    name: Update the `Pwsh` version in the goss test
    kind: yaml
    spec:
      engine: "yamlpath"
      files:
        - "tests/goss-windows.yaml"
      key: $.command.pwsh.stdout[0]
    transformers:
      - replacer:
          from: "."
          to: ".*"
      - addprefix: "/"
      - addsuffix: "/"
    scmid: default

actions:
  default:
    kind: github/pullrequest
    title: Bump pwsh version to {{ source "lastReleaseVersion" }}
    scmid: default
    spec:
      labels:
        - enhancement
        - pwsh
        - windows
