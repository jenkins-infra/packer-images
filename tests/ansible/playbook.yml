---
- name: tests
  hosts: all
  become: true
  become_user: jenkins
  gather_facts: true
  vars_files:
    - ../../provisioning/tools-versions.yml
    - ../../jdks-infos.yaml
  vars:
    ansible_python_interpreter: /usr/local/bin/python3.14
    ansible_remote_tmp: /tmp/.ansible

  tasks:
    - name: Import common tests
      ansible.builtin.import_tasks: tasks/tests_common.yml

    - name: Import Linux tests
      ansible.builtin.import_tasks: tasks/tests_linux.yml
      tags: [linux_only]
      environment:
        PATH: "/home/jenkins/.asdf/shims:/home/jenkins/.asdf/bin:{{ ansible_facts['env']['PATH'] }}"
        ASDF_DIR: "/home/jenkins/.asdf"
