---
# Test Harness specific for all hosts
command:
  awscli:
    exec: aws --version
    exit-status: 0
    timeout: 20000
    stdout:
      - 2.35.15
  azurecli:
    exec: az --version
    exit-status: 0
    timeout: 20000
    stdout:
      - 2.88.0
  bundle:
    exec: bundle -v
    exit-status: 0
  container-structure-test:
    exec: container-structure-test version
    exit-status: 0
    stdout:
      - 1.22.1
  docker-ce:
    exec: docker -v
    exit-status: 0
    stdout:
      - 29.6.1
  docker_buildx:
    exec: docker buildx version
    exit-status: 0
  default_java:
    exec: java --version
    exit-status:
      not: 0
  docker_compose:
    exec: docker-compose -v
    exit-status: 0
    stdout:
      - 5.3.0
  gh_cli:
    exec: gh --version
    exit-status: 0
    stdout:
      - 2.96.0
  git_lfs:
    exec: git-lfs --version
    exit-status: 0
    stdout:
      - 3.7.1
  goss:
    exec: goss --version
    exit-status: 0
    stdout:
      - 0.4.9
  hadolint:
    exec: hadolint --version
    exit-status: 0
    stdout:
      - 2.14.0
    timeout: 60000
  jq:
    exec: jq --version
    exit-status: 0
    stdout:
      - jq-1.8.2
  jx-release-version:
    exec: jx-release-version -version
    exit-status: 0
    stdout:
      - 2.9.6
  kubectl:
    exec: kubectl version --client
    exit-status: 0
    stdout:
      - 1.34.9
  launchable:
    exec: launchable --version
    exit-status: 0
    stdout:
      - 1.124.4
  make:
    exec: make --version
    exit-status: 0
  netlify-deploy:
    exec: netlify-deploy --help
    exit-status: 0
  npm:
    exec: npm --version
    exit-status: 0
    stdout:
      - '!No preset version installed for command npm'
  packer:
    exec: packer -v
    exit-status: 0
    timeout: 20000
    stdout:
      - 1.15.4
  playwright:
    exec: playwright --version
    exit-status: 0
    stdout:
      - 1.61.1
  playwright-chromium-cache:
    exec: playwright install --list
    exit-status: 0
    stdout:
      - 'chromium_headless_shell'
      - 'ffmpeg'
  terraform:
    exec: terraform -v
    exit-status: 0
    timeout: 20000
    stdout:
      - 1.15.7
  updatecli:
    exec: updatecli version
    exit-status: 0
    stdout:
      - 0.118.0
  yq:
    exec: yq --version
    exit-status: 0
    stdout:
      - 4.53.3
