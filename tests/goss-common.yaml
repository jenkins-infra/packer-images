---
# Test Harness specific for all hosts
command:
  awscli:
    exec: aws --version
    exit-status: 0
    timeout: 20000
    stdout:
      - 2.35.4
  azurecli:
    exec: az --version
    exit-status: 0
    timeout: 20000
    stdout:
      - 2.87.0
  bundle:
    exec: bundle -v
    exit-status: 0
  container-structure-test:
    exec: container-structure-test version
    exit-status: 0
    stdout:
      - 1.22.1
  docker-ce:
    exec: docker -v
    exit-status: 0
    stdout:
      - 29.5.3
  docker_buildx:
    exec: docker buildx version
    exit-status: 0
  default_java:
    exec: java --version
    exit-status:
      not: 0
  docker_compose:
    exec: docker-compose -v
    exit-status: 0
    stdout:
      - 5.1.4
  gh_cli:
    exec: gh --version
    exit-status: 0
    stdout:
      - 2.94.0
  git_lfs:
    exec: git-lfs --version
    exit-status: 0
    stdout:
      - 3.7.1
  goss:
    exec: goss --version
    exit-status: 0
    stdout:
      - 0.4.9
  hadolint:
    exec: hadolint --version
    exit-status: 0
    stdout:
      - 2.14.0
    timeout: 60000
  jq:
    exec: jq --version
    exit-status: 0
    stdout:
      - 1.8.1
  jx-release-version:
    exec: jx-release-version -version
    exit-status: 0
    stdout:
      - 2.9.3
  kubectl:
    exec: kubectl version --client
    exit-status: 0
    stdout:
      - 1.34.9
  launchable:
    exec: launchable --version
    exit-status: 0
    stdout:
      - 1.124.2
  make:
    exec: make --version
    exit-status: 0
  netlify-deploy:
    exec: netlify-deploy --help
    exit-status: 0
  npm:
    exec: npm --version
    exit-status: 0
    stdout:
      - '!No preset version installed for command npm'
  packer:
    exec: packer -v
    exit-status: 0
    timeout: 20000
    stdout:
      - 1.15.4
  terraform:
    exec: terraform -v
    exit-status: 0
    timeout: 20000
    stdout:
      - 1.15.6
  updatecli:
    exec: updatecli version
    exit-status: 0
    stdout:
      - 0.118.0
  yq:
    exec: yq --version
    exit-status: 0
    stdout:
      - 4.53.2
