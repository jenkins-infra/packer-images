---
# Test Harness specific for all Linux hosts
command:
  asdf:
    exec: asdf version
    exit-status: 0
    stdout:
      - v0.15.0
  azcopy:
    exec: azcopy --version
    exit-status: 0
    stdout:
      - 10.32.4
  datadog-agent:
    exec: datadog-agent version
    exit-status: 0
  doctl:
    exec: doctl version
    exit-status: 0
    stdout:
      - 1.162.0
  git:
    exec: git --version
    exit-status: 0
    stdout:
      - 2.54.0
  golang:
    exec: go version
    exit-status: 0
    stdout:
      - 1.26.4
  golangci-lint:
    exec: golangci-lint --version
    exit-status: 0
    stdout:
      - 2.12.2
  helm:
    exec: helm version
    exit-status: 0
    stdout:
      - 3.19.1
  helmfile:
    exec: helmfile --version
    exit-status: 0
    stdout:
      - 1.5.4
  helmplugins:
    exec: helm plugin list
    exit-status: 0
    stdout:
      - /diff.*3.15.9/
      - /helm-git.*1.5.2/
      - /secrets.*4.7.7/
  jdk11:
    exec: /opt/jdk-11/bin/java --version
    exit-status: 0
    stdout:
      - 11.0.31+11
  jdk17:
    exec: /opt/jdk-17/bin/java --version
    exit-status: 0
    stdout:
      - 17.0.19+10
  jdk21:
    exec: /opt/jdk-21/bin/java --version
    exit-status: 0
    stdout:
      - 21.0.11+10
  jdk25:
    exec: /opt/jdk-25/bin/java --version
    exit-status: 0
    stdout:
      - "25.0.3+9"
  jdk8:
    exec: /opt/jdk-8/bin/java -version
    exit-status: 0
    stderr:
      - 1.8.0_492
  maven:
    exec: JAVA_HOME=/opt/jdk-21 mvn -v
    exit-status: 0
    stdout:
      - 3.9.16
  nodejs:
    exec: node --version
    exit-status: 0
    stdout:
      - 24.16.0
      - '!Please install a version by running one of the following'
  parallel:
    exec: parallel --version
    exit-status: 0
  playwright:
    exec: playwright --version
    exit-status: 0
    stdout:
      - 1.61.0
  playwright-chromium-cache:
    exec: playwright install --list
    exit-status: 0
    stdout:
      - 'chromium_headless_shell'
      - 'ffmpeg'
  python3:
    exec: python3 --version
    exit-status: 0
  rsync:
    exec: rsync --version
    exit-status: 0
  ruby:
    exec: asdf list ruby
    exit-status: 0
    stdout:
      - 2.6.10
      - 3.4.8
  rngd:
    exec: rngd --version
    exit-status: 0
  sops:
    exec: sops --version
    exit-status: 0
    stdout:
      - 3.13.1
  ssh_agent:
    exec: command -v ssh-agent
    exit-status: 0
  # TODO track with updatecli
  typos:
    exec: typos --version
    exit-status: 0
    stdout:
      - 1.33.1
  unzip:
    exec: unzip -v
    exit-status: 0
  xq:
    exec: xq --version
    exit-status: 0
    stdout:
      - 1.2.3
  yamllint:
    exec: yamllint -v
    exit-status: 0
  zip:
    exec: zip -v
    exit-status: 0
file:
  /home/jenkins:
    contains: []
    exists: true
    filetype: directory
    group: jenkins
    mode: '0750'
    owner: jenkins
