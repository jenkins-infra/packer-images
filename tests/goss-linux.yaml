---
# Test Harness specific for all Linux hosts
command:
  asdf:
    exec: asdf version
    exit-status: 0
    stdout:
      - v0.15.0
  azcopy:
    exec: azcopy --version
    exit-status: 0
    stdout:
      - 10.32.2
  chromium-browser:
    exec: chromium-browser --version
    exit-status: 0
  datadog-agent:
    exec: datadog-agent version
    exit-status: 0
  doctl:
    exec: doctl version
    exit-status: 0
    stdout:
      - 1.152.0
  git:
    exec: git --version
    exit-status: 0
    stdout:
      - 2.53.0
  golang:
    exec: go version
    exit-status: 0
    stdout:
      - 1.26.1
  golangci-lint:
    exec: golangci-lint --version
    exit-status: 0
    stdout:
      - 2.11.4
  helm:
    exec: helm version
    exit-status: 0
    stdout:
      - 3.19.1
  helmfile:
    exec: helmfile --version
    exit-status: 0
    stdout:
      - 1.4.2
  helmplugins:
    exec: helm plugin list
    exit-status: 0
    stdout:
      - /diff.*3.15.3/
      - /helm-git.*1.5.2/
      - /secrets.*4.7.5/
  jdk11:
    exec: /opt/jdk-11/bin/java --version
    exit-status: 0
    stdout:
      - 11.0.30+7
  jdk17:
    exec: /opt/jdk-17/bin/java --version
    exit-status: 0
    stdout:
      - 17.0.18+8
  jdk21:
    exec: /opt/jdk-21/bin/java --version
    exit-status: 0
    stdout:
      - 21.0.10+7
  jdk25:
    exec: /opt/jdk-25/bin/java --version
    exit-status: 0
    stdout:
      - "25.0.2+10"
  jdk8:
    exec: /opt/jdk-8/bin/java -version
    exit-status: 0
    stderr:
      - 1.8.0_482
  maven:
    exec: JAVA_HOME=/opt/jdk-21 mvn -v
    exit-status: 0
    stdout:
      - 3.9.13
  nodejs:
    exec: node --version
    exit-status: 0
    stdout:
      - 22.22.1
      - '!Please install a version by running one of the following'
  parallel:
    exec: parallel --version
    exit-status: 0
  playwright:
    exec: playwright --version
    exit-status: 0
    stdout:
      - 1.58.2
  python3:
    exec: python3 --version
    exit-status: 0
  rsync:
    exec: rsync --version
    exit-status: 0
  ruby:
    exec: asdf list ruby
    exit-status: 0
    stdout:
      - 2.6.10
      - 3.4.8
  rngd:
    exec: rngd --version
    exit-status: 0
  sops:
    exec: sops --version
    exit-status: 0
    stdout:
      - 3.12.2
  ssh_agent:
    exec: command -v ssh-agent
    exit-status: 0
  # TODO track with updatecli
  typos:
    exec: typos --version
    exit-status: 0
    stdout:
      - 1.33.1
  unzip:
    exec: unzip -v
    exit-status: 0
  xq:
    exec: xq --version
    exit-status: 0
    stdout:
      - 1.2.3
  yamllint:
    exec: yamllint -v
    exit-status: 0
  zip:
    exec: zip -v
    exit-status: 0
file:
  /home/jenkins:
    contains: []
    exists: true
    filetype: directory
    group: jenkins
    mode: '0750'
    owner: jenkins
