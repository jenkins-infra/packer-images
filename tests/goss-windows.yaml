---
# Test Harness specific for all Windows hosts
command:
  chocolatey:
    exec: choco
    exit-status: 1
  docker-ce:
    exec: docker -v
    exit-status: 0
  docker-buildx:
    exec: docker buildx version
    exit-status: 0
  jdk11:
    exec: C:\tools\jdk-11\bin\java --version
    exit-status: 0
    stdout:
      - 11.0.31+11
  jdk17:
    exec: C:\tools\jdk-17\bin\java --version
    exit-status: 0
    stdout:
      - 17.0.19+10
  jdk21:
    exec: C:\tools\jdk-21\bin\java --version
    exit-status: 0
    stdout:
      - 21.0.11+10
  jdk25:
    exec: C:\tools\jdk-25\bin\java --version
    exit-status: 0
    stdout:
      - "25.0.3+9"
  jdk8:
    exec: C:\tools\jdk-8\bin\java -version
    exit-status: 0
    stderr:
      - 1.8.0_492
  maven-env:
    exec: pwsh -command "echo $env:MAVEN_HOME"
    exit-status: 0
    stdout:
      - 'C:\tools\apache-maven-'
  maven:
    exec: pwsh -command "$env:JAVA_HOME='C:\tools\jdk-21'; mvn -v"
    exit-status: 0
    stdout:
      - 3.9.16
  nodejs:
    exec: node --version
    exit-status: 0
    stdout:
      - 24.16.0
      - '!Please install a version by running one of the following'
  nuget:
    exec: nuget help
    exit-status: 0
    stdout:
      - 7.6.0
  powershell:
    exec: powershell -command "(Get-Host).Version"
    exit-status: 0
  pwsh:
    exec: pwsh -command "(Get-Host).Version"
    exit-status: 0
    stdout:
      - /7.*6.*3/
  python3:
    exec: python --version
    exit-status: 0
    stdout:
      - 3.14.6
  ruby:
    exec: ruby -v
    exit-status: 0
    stdout:
      - 3.4.8
  dotnet35:
    exec: pwsh -command "Test-Path -Path 'HKLM:\\SOFTWARE\\Microsoft\\NET Framework Setup\\NDP\\v3.5'"
    exit-status: 0
    stdout:
      - 'True'
file:
  C:\Program Files\Datadog\Datadog agent\bin\:
    exists: true
    filetype: directory
  C:\ProgramData\Datadog\datadog.yaml:
    exists: true
    filetype: file
